<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="The Block">
<meta name="theme-color" content="#e8e6df">
<title>The Block — 5-Day Hybrid Training Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #e8e6df;
  --bg-card: #f3f1ec;
  --bg-elevated: #fbfaf5;
  --ink: #181816;
  --ink-heavy: #0a0a09;
  --ink-muted: #6a6962;
  --ink-faint: #aeaba0;
  --divider: #d0cdc2;
  --border: #b8b5ac;
  --border-strong: #6a6962;

  --navy: #1d4f8b;
  --navy-deep: #143661;
  --navy-bright: #2966b2;
  --navy-faint: #d7dfeb;

  --build: #1d4f8b;
  --maintain: #6a6962;
  --cut: #a8311a;
  --done: #4a7b3a;

  --display: 'Archivo', 'Helvetica Neue', Arial, sans-serif;
  --body: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
  --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--body);
  font-size: 15px;
  line-height: 1.55;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 31px, rgba(24,24,22,0.025) 31px, rgba(24,24,22,0.025) 32px);
  pointer-events: none;
  z-index: 0;
}

.app {
  position: relative;
  z-index: 1;
  max-width: 920px;
  margin: 0 auto;
  padding: 32px 24px 80px;
}

/* ==========  HEADER  ========== */
.app-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  border-bottom: 2px solid var(--ink-heavy);
  padding-bottom: 16px;
  margin-bottom: 28px;
  gap: 16px;
  flex-wrap: wrap;
}

.brand {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.brand-title {
  font-family: var(--display);
  font-weight: 900;
  font-size: 28px;
  letter-spacing: -0.02em;
  line-height: 1;
  color: var(--ink-heavy);
  text-transform: uppercase;
}

.brand-sub {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-muted);
}

.tabs {
  display: flex;
  gap: 4px;
}

.tab {
  background: none;
  border: none;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-weight: 600;
  padding: 10px 14px;
  cursor: pointer;
  color: var(--ink-muted);
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: color 0.12s, border-color 0.12s;
}

.tab:hover { color: var(--ink); }

.tab.active {
  color: var(--ink-heavy);
  border-bottom-color: var(--navy);
}

.tab:focus-visible {
  outline: 2px solid var(--navy);
  outline-offset: 2px;
}

/* ==========  PHASE BANNER  ========== */
.phase-banner {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-left: 4px solid var(--navy);
  padding: 18px 22px;
  margin-bottom: 24px;
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 20px;
  align-items: center;
}

.phase-banner.build { border-left-color: var(--build); }
.phase-banner.maintain { border-left-color: var(--maintain); }
.phase-banner.cut { border-left-color: var(--cut); }
.phase-banner.unset { border-left-color: var(--ink-faint); }

.phase-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-bottom: 4px;
}

.phase-name {
  font-family: var(--display);
  font-weight: 800;
  font-size: 22px;
  letter-spacing: -0.01em;
  text-transform: uppercase;
  color: var(--ink-heavy);
  line-height: 1;
}

.phase-numbers {
  font-family: var(--mono);
  font-weight: 600;
  font-size: 13px;
  color: var(--ink-muted);
  letter-spacing: 0.02em;
  display: flex;
  flex-direction: column;
  gap: 2px;
  text-align: center;
}

.phase-numbers strong {
  font-size: 24px;
  font-weight: 700;
  color: var(--ink-heavy);
  letter-spacing: -0.01em;
}

.phase-numbers .delta {
  font-size: 11px;
  letter-spacing: 0.06em;
}

.phase-intent {
  font-family: var(--body);
  font-style: italic;
  font-size: 14px;
  color: var(--ink-muted);
  text-align: right;
  max-width: 260px;
  line-height: 1.45;
}

/* ==========  SECTIONS  ========== */
.section-title {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-muted);
  font-weight: 600;
  margin: 32px 0 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.section-title::before {
  content: "";
  display: block;
  width: 16px;
  height: 1px;
  background: var(--ink-muted);
}

.section-title:first-child { margin-top: 0; }

/* ==========  TODAY CARD  ========== */
.today-card {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  padding: 24px 26px;
  cursor: pointer;
  transition: background 0.12s, transform 0.12s;
  display: block;
  width: 100%;
  text-align: left;
  font-family: inherit;
  color: inherit;
  text-decoration: none;
}

.today-card:hover {
  background: #fff;
}

.today-card-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 12px;
  gap: 16px;
  flex-wrap: wrap;
}

.today-day {
  font-family: var(--display);
  font-weight: 800;
  font-size: 36px;
  line-height: 1;
  letter-spacing: -0.02em;
  text-transform: uppercase;
  color: var(--ink-heavy);
}

.today-day .num {
  font-family: var(--mono);
  font-weight: 700;
  font-size: 14px;
  color: var(--ink-muted);
  vertical-align: super;
  margin-right: 12px;
  letter-spacing: 0.04em;
}

.today-focus {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 600;
  padding: 4px 8px;
  border: 1px solid var(--border-strong);
  color: var(--ink);
}

.today-focus.strength { border-color: var(--navy); color: var(--navy); }
.today-focus.hypertrophy { border-color: var(--ink-heavy); color: var(--ink-heavy); }

.today-tagline {
  font-style: italic;
  color: var(--ink-muted);
  margin-bottom: 16px;
  font-size: 14px;
}

.today-exercises {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--ink-muted);
  letter-spacing: 0.02em;
}

.today-cta {
  margin-top: 18px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  font-weight: 600;
  color: var(--navy);
}

.today-cta::after {
  content: " →";
}

/* ==========  STAT GRID (today)  ========== */
.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.stat-card {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  padding: 18px 20px;
}

.stat-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-muted);
  font-weight: 600;
  margin-bottom: 8px;
}

.stat-value {
  font-family: var(--mono);
  font-size: 32px;
  font-weight: 700;
  color: var(--ink-heavy);
  letter-spacing: -0.02em;
  line-height: 1;
  margin-bottom: 6px;
}

.stat-value .unit {
  font-size: 14px;
  color: var(--ink-muted);
  font-weight: 500;
  margin-left: 4px;
}

.stat-meta {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-muted);
}

.stat-progress {
  margin-top: 10px;
  height: 4px;
  background: var(--divider);
  position: relative;
  overflow: hidden;
}

.stat-progress-fill {
  position: absolute;
  inset: 0 auto 0 0;
  background: var(--navy);
  transition: width 0.3s ease-out;
}

.stat-card.steps .stat-progress-fill { background: var(--done); }

/* ==========  PROGRAM GRID  ========== */
.program-grid {
  display: grid;
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
}

.day-card {
  background: var(--bg-elevated);
  padding: 22px 24px;
  cursor: pointer;
  border: none;
  width: 100%;
  text-align: left;
  font-family: inherit;
  color: inherit;
  transition: background 0.12s;
  display: grid;
  grid-template-columns: 60px 1fr auto;
  gap: 22px;
  align-items: center;
}

.day-card:hover { background: #fff; }

.day-card:focus-visible {
  outline: 2px solid var(--navy);
  outline-offset: -2px;
}

.day-num {
  font-family: var(--display);
  font-weight: 900;
  font-size: 36px;
  line-height: 1;
  color: var(--ink-faint);
  letter-spacing: -0.02em;
}

.day-meta { display: flex; flex-direction: column; gap: 4px; }

.day-name-row {
  display: flex;
  align-items: baseline;
  gap: 12px;
  flex-wrap: wrap;
}

.day-name {
  font-family: var(--display);
  font-weight: 800;
  font-size: 22px;
  letter-spacing: -0.01em;
  text-transform: uppercase;
  color: var(--ink-heavy);
}

.day-focus-tag {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  font-weight: 600;
  padding: 3px 7px;
  border: 1px solid var(--border-strong);
}

.day-focus-tag.strength { border-color: var(--navy); color: var(--navy); }
.day-focus-tag.hypertrophy { border-color: var(--ink-heavy); color: var(--ink-heavy); }

.day-tagline {
  font-style: italic;
  color: var(--ink-muted);
  font-size: 13px;
  line-height: 1.45;
}

.day-stats {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-muted);
  text-align: right;
  letter-spacing: 0.02em;
  line-height: 1.5;
}

.day-stats .recency {
  color: var(--done);
  font-weight: 600;
}

/* ==========  SESSION DETAIL  ========== */
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: none;
  border: none;
  cursor: pointer;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-weight: 600;
  color: var(--ink-muted);
  padding: 8px 0;
  margin-bottom: 18px;
  transition: color 0.12s;
}

.back-link::before { content: "←"; font-size: 14px; }
.back-link:hover { color: var(--ink-heavy); }

.session-header {
  border-bottom: 2px solid var(--ink-heavy);
  padding-bottom: 22px;
  margin-bottom: 28px;
}

.session-eyebrow {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-bottom: 10px;
}

.session-title-row {
  display: flex;
  align-items: baseline;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}

.session-title {
  font-family: var(--display);
  font-weight: 900;
  font-size: clamp(32px, 6vw, 48px);
  line-height: 1;
  letter-spacing: -0.02em;
  text-transform: uppercase;
  color: var(--ink-heavy);
}

.session-tagline {
  font-family: var(--body);
  font-style: italic;
  color: var(--ink-muted);
  font-size: 16px;
  max-width: 600px;
}

.session-phase-guidance {
  background: var(--navy-faint);
  border-left: 3px solid var(--navy);
  padding: 14px 18px;
  margin-bottom: 28px;
  font-size: 14px;
  line-height: 1.6;
  color: var(--ink);
}

.session-phase-guidance.cut {
  background: #f4dfd9;
  border-left-color: var(--cut);
}

.session-phase-guidance.maintain {
  background: #e3e1d6;
  border-left-color: var(--maintain);
}

.session-phase-guidance strong {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 700;
  display: block;
  margin-bottom: 6px;
  color: var(--ink-heavy);
}

/* ==========  EXERCISE CARD  ========== */
.exercise-list { display: flex; flex-direction: column; gap: 12px; }

.exercise-card {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  padding: 18px 22px;
}

.exercise-head {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  align-items: baseline;
  margin-bottom: 4px;
}

.exercise-name-row {
  display: flex;
  align-items: baseline;
  gap: 10px;
  flex-wrap: wrap;
}

.exercise-name {
  font-family: var(--display);
  font-weight: 700;
  font-size: 18px;
  letter-spacing: -0.005em;
  color: var(--ink-heavy);
  text-transform: uppercase;
}

.role-tag {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  font-weight: 600;
  color: var(--ink-muted);
  padding: 2px 6px;
  background: var(--bg-card);
  border: 1px solid var(--border);
}

.role-tag.main {
  color: var(--navy);
  border-color: var(--navy);
  background: var(--navy-faint);
}

.scheme {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 600;
  color: var(--ink-heavy);
  letter-spacing: 0.02em;
  white-space: nowrap;
}

.scheme-meta {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-muted);
  margin-top: 8px;
  letter-spacing: 0.02em;
}

.exercise-notes {
  font-size: 13px;
  color: var(--ink-muted);
  margin-top: 10px;
  font-style: italic;
  line-height: 1.5;
}

/* Set logging */
.set-log {
  margin-top: 16px;
  padding-top: 14px;
  border-top: 1px dashed var(--divider);
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.set-row {
  display: grid;
  grid-template-columns: 32px 1fr 1fr;
  gap: 8px;
  align-items: center;
}

.set-num {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-muted);
  font-weight: 600;
  letter-spacing: 0.04em;
}

.set-input {
  font-family: var(--mono);
  font-weight: 500;
  font-size: 13px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  padding: 7px 10px;
  color: var(--ink-heavy);
  width: 100%;
  outline: none;
  transition: border-color 0.12s;
}

.set-input:focus {
  border-color: var(--navy);
  background: #fff;
}

.set-input::placeholder {
  color: var(--ink-faint);
  font-weight: 400;
}

.set-input-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-muted);
  font-weight: 600;
  display: block;
  margin-bottom: 4px;
}

.set-input-wrap { position: relative; }

/* Session actions */
.session-actions {
  margin-top: 32px;
  padding-top: 24px;
  border-top: 1px solid var(--divider);
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.btn {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  font-weight: 700;
  padding: 14px 24px;
  background: var(--ink-heavy);
  color: var(--bg);
  border: 1.5px solid var(--ink-heavy);
  cursor: pointer;
  transition: background 0.12s, color 0.12s;
}

.btn:hover {
  background: transparent;
  color: var(--ink-heavy);
}

.btn:focus-visible {
  outline: 2px solid var(--navy);
  outline-offset: 3px;
}

.btn.secondary {
  background: transparent;
  color: var(--ink-heavy);
}

.btn.secondary:hover {
  background: var(--ink-heavy);
  color: var(--bg);
}

.btn.complete {
  background: var(--done);
  border-color: var(--done);
  color: #fff;
}

.btn.complete:hover {
  background: transparent;
  color: var(--done);
}

.btn.full {
  flex: 1;
  min-width: 0;
}

.btn.danger {
  background: transparent;
  color: var(--cut);
  border-color: var(--cut);
  font-size: 10px;
  letter-spacing: 0.14em;
  padding: 10px 16px;
}

.btn.danger:hover {
  background: var(--cut);
  color: #fff;
}

/* ==========  IMPORT MODAL  ========== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(10,10,9,0.55);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 24px;
}

.modal-box {
  background: var(--bg-elevated);
  border: 1px solid var(--border-strong);
  padding: 30px;
  max-width: 420px;
  width: 100%;
}

.modal-box h3 {
  font-family: var(--display);
  font-weight: 800;
  font-size: 20px;
  text-transform: uppercase;
  margin-bottom: 10px;
  color: var(--ink-heavy);
}

.modal-box p {
  font-size: 13px;
  color: var(--ink-muted);
  line-height: 1.6;
  margin-bottom: 18px;
}

.file-input-label {
  display: block;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-weight: 600;
  text-align: center;
  padding: 16px;
  border: 1.5px dashed var(--border-strong);
  color: var(--navy);
  cursor: pointer;
  transition: all 0.12s;
  margin-bottom: 14px;
  position: relative;
}

.file-input-label:hover {
  border-color: var(--navy);
  background: var(--navy-faint);
}

.file-input-label input[type="file"] {
  position: absolute;
  width: 1px;
  height: 1px;
  opacity: 0;
}

.file-input-filename {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--done);
  margin-bottom: 16px;
  word-break: break-all;
}

.modal-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}

.modal-actions button {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-weight: 700;
  padding: 10px 16px;
  cursor: pointer;
  border: 1.5px solid var(--border-strong);
  background: transparent;
  color: var(--ink-muted);
}

.modal-actions button.primary {
  border-color: var(--navy);
  color: var(--navy);
}

.modal-actions button.primary:hover {
  background: var(--navy);
  color: #fff;
}

.modal-actions button:hover {
  color: var(--ink-heavy);
}

/* ==========  BODY (profile + log) VIEW  ========== */
.body-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}

.body-card {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  padding: 22px 24px;
}

.body-card h3 {
  font-family: var(--display);
  font-weight: 800;
  font-size: 18px;
  text-transform: uppercase;
  letter-spacing: -0.005em;
  margin-bottom: 14px;
  color: var(--ink-heavy);
}

.input-row {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 14px;
}

.input-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-muted);
  font-weight: 600;
}

.input {
  font-family: var(--mono);
  font-weight: 500;
  font-size: 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  padding: 10px 14px;
  color: var(--ink-heavy);
  width: 100%;
  outline: none;
  transition: border-color 0.12s;
}

.input:focus {
  border-color: var(--navy);
  background: #fff;
}

.input-unit-wrap {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px;
}

.unit-toggle {
  display: flex;
  border: 1px solid var(--border);
}

.unit-toggle button {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  font-weight: 600;
  padding: 0 14px;
  background: var(--bg-card);
  border: none;
  cursor: pointer;
  color: var(--ink-muted);
  border-right: 1px solid var(--border);
}

.unit-toggle button:last-child { border-right: none; }

.unit-toggle button.active {
  background: var(--ink-heavy);
  color: var(--bg);
}

.log-list {
  margin-top: 8px;
  border-top: 1px solid var(--divider);
}

.log-entry {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--divider);
  font-family: var(--mono);
  font-size: 12px;
  align-items: center;
}

.log-entry .date {
  color: var(--ink-muted);
  letter-spacing: 0.02em;
}

.log-entry .value {
  font-weight: 600;
  color: var(--ink-heavy);
  font-size: 13px;
  text-align: right;
}

.log-entry .remove {
  background: none;
  border: none;
  color: var(--ink-faint);
  cursor: pointer;
  font-size: 14px;
  padding: 2px 6px;
}

.log-entry .remove:hover { color: var(--cut); }

.empty-state {
  font-size: 13px;
  color: var(--ink-faint);
  font-style: italic;
  padding: 12px 0;
}

/* About / footer */
.footer {
  margin-top: 60px;
  padding-top: 24px;
  border-top: 1px solid var(--divider);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}

.footer-note {
  font-size: 12px;
  color: var(--ink-muted);
  font-style: italic;
  max-width: 540px;
  line-height: 1.5;
}

.footer-note strong {
  color: var(--ink-heavy);
  font-style: normal;
  font-weight: 600;
}

.storage-warning {
  background: #f4dfd9;
  border: 1px solid var(--cut);
  padding: 10px 14px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--cut);
  margin-bottom: 20px;
  letter-spacing: 0.02em;
}

/* ==========  RESPONSIVE  ========== */
@media (max-width: 720px) {
  .app { padding: 24px 16px 60px; }
  .app-header {
    flex-direction: column;
    align-items: stretch;
    gap: 12px;
    padding-bottom: 12px;
  }
  .tabs { justify-content: space-between; }
  .tab { padding: 10px 8px; font-size: 10px; }
  .phase-banner {
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .phase-intent {
    grid-column: 1 / -1;
    text-align: left;
    max-width: none;
  }
  .stat-grid { grid-template-columns: 1fr; }
  .body-grid { grid-template-columns: 1fr; }
  .day-card { grid-template-columns: 48px 1fr; gap: 16px; padding: 18px 20px; }
  .day-stats { grid-column: 1 / -1; text-align: left; }
  .day-num { font-size: 28px; }
  .day-name { font-size: 18px; }
  .session-actions { flex-direction: column; }
  .btn.full { width: 100%; }
}

/* =====================================================
   STATE & STORAGE
   ===================================================== */
const STORAGE_KEYS = {
  profile: 'wo-profile',
  weights: 'wo-weights',
  sessions: 'wo-sessions',
  steps: 'wo-steps'
};

  // Transient: in-progress session being logged
  draftSession: null
};

// Storage adapter: prefers Claude's window.storage when present, falls back to
// localStorage so the same file works when saved to disk or hosted elsewhere.
const storage = {
  mode: null, // 'artifact' | 'local' | 'none'
  async init() {
    if (typeof window.storage !== 'undefined') {
      this.mode = 'artifact';
      return;
    }
    try {
      const t = '__storage_test__';
      localStorage.setItem(t, t);
      localStorage.removeItem(t);
      this.mode = 'local';
    } catch (e) {
      this.mode = 'none';
    }
  },
  async get(key) {
    if (this.mode === 'artifact') {
      try {
        const r = await window.storage.get(key);
        return r ? JSON.parse(r.value) : null;
      } catch (e) { return null; }
    }
    if (this.mode === 'local') {
      try {
        const v = localStorage.getItem(key);
        return v ? JSON.parse(v) : null;
      } catch (e) { return null; }
    }
    return null;
  },
  async set(key, value) {
    const json = JSON.stringify(value);
    if (this.mode === 'artifact') {
      try { await window.storage.set(key, json); } catch (e) {}
    } else if (this.mode === 'local') {
      try { localStorage.setItem(key, json); } catch (e) {}
    }
  },
  async delete(key) {
    if (this.mode === 'artifact') {
      try { await window.storage.delete(key); } catch (e) {}
    } else if (this.mode === 'local') {
      try { localStorage.removeItem(key); } catch (e) {}
    }
  }
};

async function loadAll() {
  const [p, w, s, st] = await Promise.all([
    storage.get(STORAGE_KEYS.profile),
    storage.get(STORAGE_KEYS.weights),
    storage.get(STORAGE_KEYS.sessions),
    storage.get(STORAGE_KEYS.steps)
  ]);
  if (p) state.profile = { ...state.profile, ...p };
  if (Array.isArray(w)) state.weights = w;
  if (Array.isArray(s)) state.sessions = s;
  if (st && typeof st === 'object') state.steps = st;
}

async function saveProfile() { await storage.set(STORAGE_KEYS.profile, state.profile); }
async function saveWeights() { await storage.set(STORAGE_KEYS.weights, state.weights); }
async function saveSessions() { await storage.set(STORAGE_KEYS.sessions, state.sessions); }
async function saveSteps() { await storage.set(STORAGE_KEYS.steps, state.steps); }

async function exportAll() {
  const payload = { _meta: { app: 'workout', exported: new Date().toISOString() } };
  for (const key of Object.values(STORAGE_KEYS)) {
    const v = await storage.get(key);
    if (v !== null) payload[key] = v;
  }
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `workout-data-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 100);
}

function importAll() {
  let selectedFile = null;

  function closeModal() {
    const overlay = document.getElementById('import-modal-overlay');
    if (overlay) overlay.remove();
  }

  const fileLabel = el('label', { class: 'file-input-label' }, 'Tap to choose a file',
    el('input', {
      type: 'file',
      accept: 'application/json,.json',
      onchange: (e) => {
        selectedFile = e.target.files && e.target.files[0];
        filenameDisplay.textContent = selectedFile ? selectedFile.name : '';
        fileLabel.firstChild.textContent = selectedFile ? 'Change file' : 'Tap to choose a file';
      }
    })
  );
  const filenameDisplay = el('div', { class: 'file-input-filename' }, '');

  const overlay = el('div', {
    class: 'modal-overlay',
    id: 'import-modal-overlay',
    onclick: (e) => { if (e.target === overlay) closeModal(); }
  },
    el('div', { class: 'modal-box' },
      el('h3', {}, 'Import data'),
      el('p', {}, 'Choose a previously exported workout-data JSON file. Matching keys will be overwritten.'),
      fileLabel,
      filenameDisplay,
      el('div', { class: 'modal-actions' },
        el('button', { onclick: closeModal }, 'Cancel'),
        el('button', {
          class: 'primary',
          onclick: async () => {
            if (!selectedFile) { alert('Choose a file first.'); return; }
            try {
              const text = await selectedFile.text();
              const data = JSON.parse(text);
              const validKeys = new Set(Object.values(STORAGE_KEYS));
              let imported = 0;
              for (const [k, v] of Object.entries(data)) {
                if (validKeys.has(k)) {
                  await storage.set(k, v);
                  imported++;
                }
              }
              if (imported === 0) {
                alert('No workout data found in that file.');
                return;
              }
              await loadAll();
              closeModal();
              render();
            } catch (err) {
              alert('Import failed: ' + err.message);
            }
          }
        }, 'Import')
      )
    )
  );
  document.body.appendChild(overlay);
}

async function resetAll() {
  if (!confirm('Reset all data? Profile, weights, sessions, and steps will be cleared.')) return;
  state.profile = { currentWeight: null, targetWeight: null, units: 'lbs' };
  state.weights = [];
  state.sessions = [];
  state.steps = {};
  await Promise.all([
    storage.delete(STORAGE_KEYS.profile),
    storage.delete(STORAGE_KEYS.weights),
    storage.delete(STORAGE_KEYS.sessions),
    storage.delete(STORAGE_KEYS.steps)
  ]);
  navigate('today');
}

/* =====================================================
   HELPERS
   ===================================================== */
function todayStr() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function fmtDate(s) {
  const d = new Date(s + 'T00:00:00');
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
}

function daysAgo(s) {
  const t = new Date();
  t.setHours(0,0,0,0);
  const d = new Date(s + 'T00:00:00');
  return Math.floor((t - d) / 86400000);
}

function findDay(id) { return program.days.find(d => d.id === id); }

function findExercise(dayId, exId) {
  const day = findDay(dayId);
  return day ? day.exercises.find(e => e.id === exId) : null;
}

function lastCompletedSession() {
  const done = state.sessions.filter(s => s.completed);
  if (!done.length) return null;
  return done[done.length - 1];
}

function lastSessionForDay(dayId) {
  for (let i = state.sessions.length - 1; i >= 0; i--) {
    if (state.sessions[i].dayId === dayId && state.sessions[i].completed) return state.sessions[i];
  }
  return null;
}

function todaysDayId() {
  // Next session = the one after the most recently completed, cycling.
  const last = lastCompletedSession();
  if (!last) return program.days[0].id;
  const idx = program.days.findIndex(d => d.id === last.dayId);
  return program.days[(idx + 1) % program.days.length].id;
}

function currentPhase() {
  const { currentWeight: c, targetWeight: t } = state.profile;
  if (c == null || t == null) return null;
  const delta = t - c;
  if (delta > 3) return 'build';
  if (delta < -3) return 'cut';
  return 'maintain';
}

function el(tag, attrs = {}, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs || {})) {
    if (v == null || v === false) continue;
    if (k === 'class') e.className = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'style' && typeof v === 'object') Object.assign(e.style, v);
    else if (k === 'value') e.value = v;
    else e.setAttribute(k, v);
  }
  for (const child of children.flat()) {
    if (child == null || child === false) continue;
    if (typeof child === 'string' || typeof child === 'number')
      e.appendChild(document.createTextNode(String(child)));
    else e.appendChild(child);
  }
  return e;
}

/* =====================================================
   PHASE BANNER
   ===================================================== */
function renderPhaseBanner() {
  const phase = currentPhase();
  const { currentWeight, targetWeight, units } = state.profile;
  const cls = 'phase-banner ' + (phase || 'unset');

  if (!phase) {
    return el('div', { class: cls },
      el('div', {},
        el('div', { class: 'phase-label' }, 'Phase'),
        el('div', { class: 'phase-name' }, 'Set your numbers')
      ),
      el('div', { class: 'phase-numbers' },
        el('span', {}, '—'),
        el('span', { class: 'delta' }, 'no target set')
      ),
      el('div', { class: 'phase-intent' },
        'Add a current and target bodyweight in ',
        el('a', { href: '#', onclick: (e) => { e.preventDefault(); navigate('body'); }, style: { color: 'var(--navy)', textDecoration: 'underline' } }, 'Body'),
        ' to activate the phase-aware programming.'
      )
    );
  }

  const g = PHASE_GUIDANCE[phase];
  const delta = targetWeight - currentWeight;
  const deltaStr = (delta > 0 ? '+' : '') + delta.toFixed(1) + ' ' + units;

  return el('div', { class: cls },
    el('div', {},
      el('div', { class: 'phase-label' }, 'Current Phase'),
      el('div', { class: 'phase-name' }, g.short)
    ),
    el('div', { class: 'phase-numbers' },
      el('strong', {}, currentWeight.toFixed(1)),
      el('span', { class: 'delta' }, `target ${targetWeight.toFixed(1)} · ${deltaStr}`)
    ),
    el('div', { class: 'phase-intent' }, g.intent)
  );
}

/* =====================================================
   VIEW: TODAY
   ===================================================== */
function renderToday() {
  const wrap = el('div');
  wrap.appendChild(renderPhaseBanner());

  // Today's session card
  const dayId = todaysDayId();
  const day = findDay(dayId);
  const lastDone = lastSessionForDay(dayId);
  const lastDoneText = lastDone
    ? `Last ${day.name}: ${daysAgo(lastDone.date)} day${daysAgo(lastDone.date) === 1 ? '' : 's'} ago`
    : `You haven't done ${day.name} yet`;

  wrap.appendChild(el('div', { class: 'section-title' }, 'Up next'));
  wrap.appendChild(el('button', {
    class: 'today-card',
    onclick: () => openSession(dayId)
  },
    el('div', { class: 'today-card-header' },
      el('div', { class: 'today-day' },
        el('span', { class: 'num' }, 'Day ' + day.num),
        day.name
      ),
      el('div', { class: 'today-focus ' + day.focus }, day.focus)
    ),
    el('div', { class: 'today-tagline' }, day.tagline),
    el('div', { class: 'today-exercises' },
      `${day.exercises.length} exercises  ·  ${day.exercises.reduce((s, e) => s + e.sets, 0)} working sets  ·  ${lastDoneText}`
    ),
    el('div', { class: 'today-cta' }, 'Start session')
  ));

  // Steps + weight quick view
  wrap.appendChild(el('div', { class: 'section-title' }, 'Today'));
  const todayKey = todayStr();
  const todaySteps = state.steps[todayKey] || 0;
  const pct = Math.min(100, (todaySteps / program.meta.stepGoal) * 100);
  const recentWeight = state.weights[state.weights.length - 1];

  wrap.appendChild(el('div', { class: 'stat-grid' },
    el('div', { class: 'stat-card steps' },
      el('div', { class: 'stat-label' }, 'Steps · goal 20,000'),
      el('div', { class: 'stat-value' },
        todaySteps.toLocaleString(),
        el('span', { class: 'unit' }, '/ 20,000')
      ),
      el('div', { class: 'stat-meta' }, `${Math.round(pct)}% of daily goal`),
      el('div', { class: 'stat-progress' },
        el('div', { class: 'stat-progress-fill', style: { width: pct + '%' } })
      )
    ),
    el('div', { class: 'stat-card' },
      el('div', { class: 'stat-label' }, 'Bodyweight · latest'),
      el('div', { class: 'stat-value' },
        recentWeight ? recentWeight.weight.toFixed(1) : '—',
        recentWeight && el('span', { class: 'unit' }, recentWeight.units || state.profile.units)
      ),
      el('div', { class: 'stat-meta' },
        recentWeight ? `logged ${fmtDate(recentWeight.date)}` : 'no entries yet'
      )
    )
  ));

  // Quick-log row
  wrap.appendChild(el('div', { class: 'section-title' }, 'Quick log'));
  wrap.appendChild(renderQuickLog());

  wrap.appendChild(renderFooter());
  return wrap;
}

function renderQuickLog() {
  let stepsVal = state.steps[todayStr()] || '';
  let weightVal = '';

  const form = el('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px' } });

  const stepsCard = el('div', { class: 'body-card' },
    el('h3', {}, 'Steps today'),
    el('div', { class: 'input-row' },
      el('label', { class: 'input-label' }, 'Steps'),
      el('input', {
        class: 'input',
        type: 'number',
        placeholder: '0',
        value: stepsVal,
        onchange: (e) => { stepsVal = e.target.value; },
        oninput: (e) => { stepsVal = e.target.value; }
      })
    ),
    el('button', {
      class: 'btn full',
      onclick: async () => {
        const n = parseInt(stepsVal, 10);
        if (isNaN(n) || n < 0) return;
        state.steps[todayStr()] = n;
        await saveSteps();
        render();
      }
    }, 'Save steps')
  );

  const wCard = el('div', { class: 'body-card' },
    el('h3', {}, 'Bodyweight today'),
    el('div', { class: 'input-row' },
      el('label', { class: 'input-label' }, `Weight (${state.profile.units})`),
      el('input', {
        class: 'input',
        type: 'number',
        step: '0.1',
        placeholder: '0.0',
        oninput: (e) => { weightVal = e.target.value; }
      })
    ),
    el('button', {
      class: 'btn full',
      onclick: async () => {
        const n = parseFloat(weightVal);
        if (isNaN(n) || n <= 0) return;
        // Replace today's entry if exists, otherwise append
        const date = todayStr();
        const idx = state.weights.findIndex(w => w.date === date);
        const entry = { date, weight: n, units: state.profile.units };
        if (idx >= 0) state.weights[idx] = entry;
        else state.weights.push(entry);
        state.profile.currentWeight = n;
        await Promise.all([saveWeights(), saveProfile()]);
        render();
      }
    }, 'Save weight')
  );

  form.appendChild(stepsCard);
  form.appendChild(wCard);
  return form;
}

/* =====================================================
   VIEW: PROGRAM
   ===================================================== */
function renderProgram() {
  const wrap = el('div');
  wrap.appendChild(renderPhaseBanner());

  wrap.appendChild(el('div', { class: 'section-title' }, 'The week'));

  const grid = el('div', { class: 'program-grid' });
  program.days.forEach(day => {
    const last = lastSessionForDay(day.id);
    const lastText = last ? `${daysAgo(last.date)}d ago` : 'never';
    const card = el('button', {
      class: 'day-card',
      onclick: () => openSession(day.id)
    },
      el('div', { class: 'day-num' }, day.num),
      el('div', { class: 'day-meta' },
        el('div', { class: 'day-name-row' },
          el('div', { class: 'day-name' }, day.name),
          el('div', { class: 'day-focus-tag ' + day.focus }, day.focus)
        ),
        el('div', { class: 'day-tagline' }, day.tagline)
      ),
      el('div', { class: 'day-stats' },
        el('div', {}, `${day.exercises.length} lifts`),
        el('div', { class: last ? 'recency' : '' }, lastText)
      )
    );
    grid.appendChild(card);
  });
  wrap.appendChild(grid);

  wrap.appendChild(renderFooter());
  return wrap;
}

/* =====================================================
   VIEW: SESSION
   ===================================================== */
function openSession(dayId) {
  // Initialize draft session from last logged session (so weights pre-fill)
  const last = lastSessionForDay(dayId);
  const draftSets = {};
  const day = findDay(dayId);
  day.exercises.forEach(ex => {
    const lastSets = last && last.sets && last.sets[ex.id];
    draftSets[ex.id] = [];
    for (let i = 0; i < ex.sets; i++) {
      const lastSet = lastSets && lastSets[i];
      draftSets[ex.id].push({
        w: lastSet ? lastSet.w : '',
        r: lastSet ? lastSet.r : ''
      });
    }
  });
  state.draftSession = {
    date: todayStr(),
    dayId,
    sets: draftSets
  };
  state.currentDayId = dayId;
  navigate('session');
}

function renderSession() {
  const day = findDay(state.currentDayId);
  if (!day) { navigate('program'); return el('div'); }
  const phase = currentPhase();
  const guidance = phase ? PHASE_GUIDANCE[phase] : null;

  const wrap = el('div');

  wrap.appendChild(el('button', {
    class: 'back-link',
    onclick: () => navigate('program')
  }, 'Back to program'));

  wrap.appendChild(el('section', { class: 'session-header' },
    el('div', { class: 'session-eyebrow' }, `Day ${day.num}  ·  ${day.focus === 'strength' ? 'Strength priority' : 'Hypertrophy priority'}`),
    el('div', { class: 'session-title-row' },
      el('h1', { class: 'session-title' }, day.name)
    ),
    el('div', { class: 'session-tagline' }, day.tagline)
  ));

  if (guidance) {
    wrap.appendChild(el('div', { class: 'session-phase-guidance ' + phase },
      el('strong', {}, `${guidance.name}  ·  guidance for this session`),
      el('span', {}, guidance.detail)
    ));
  }

  const list = el('div', { class: 'exercise-list' });
  day.exercises.forEach(ex => list.appendChild(renderExercise(day, ex)));
  wrap.appendChild(list);

  wrap.appendChild(el('div', { class: 'session-actions' },
    el('button', {
      class: 'btn complete full',
      onclick: completeSession
    }, '✓ Mark session complete'),
    el('button', {
      class: 'btn secondary',
      onclick: () => { state.draftSession = null; navigate('program'); }
    }, 'Discard')
  ));

  return wrap;
}

function renderExercise(day, ex) {
  const draft = state.draftSession.sets[ex.id];
  const card = el('article', { class: 'exercise-card' },
    el('div', { class: 'exercise-head' },
      el('div', { class: 'exercise-name-row' },
        el('div', { class: 'exercise-name' }, ex.name),
        el('div', { class: 'role-tag ' + (ex.role === 'main' ? 'main' : '') }, ex.role)
      ),
      el('div', { class: 'scheme' }, `${ex.sets} × ${ex.reps}`)
    ),
    el('div', { class: 'scheme-meta' }, `${ex.rir}  ·  rest ${ex.rest}`),
    el('p', { class: 'exercise-notes' }, ex.notes)
  );

  const log = el('div', { class: 'set-log' });
  for (let i = 0; i < ex.sets; i++) {
    const setRow = el('div', { class: 'set-row' },
      el('div', { class: 'set-num' }, `Set ${i + 1}`),
      el('div', { class: 'set-input-wrap' },
        el('input', {
          class: 'set-input',
          type: 'number',
          step: '0.5',
          placeholder: 'weight',
          value: draft[i].w,
          oninput: (e) => { draft[i].w = e.target.value; }
        })
      ),
      el('div', { class: 'set-input-wrap' },
        el('input', {
          class: 'set-input',
          type: 'number',
          placeholder: 'reps',
          value: draft[i].r,
          oninput: (e) => { draft[i].r = e.target.value; }
        })
      )
    );
    log.appendChild(setRow);
  }
  card.appendChild(log);
  return card;
}

async function completeSession() {
  if (!state.draftSession) return;
  // Strip empty sets but keep the entry
  const cleaned = {};
  for (const [exId, sets] of Object.entries(state.draftSession.sets)) {
    cleaned[exId] = sets.map(s => ({
      w: s.w === '' ? null : parseFloat(s.w),
      r: s.r === '' ? null : parseInt(s.r, 10)
    }));
  }
  const entry = {
    date: state.draftSession.date,
    dayId: state.draftSession.dayId,
    sets: cleaned,
    completed: true
  };
  state.sessions.push(entry);
  await saveSessions();
  state.draftSession = null;
  navigate('today');
}

/* =====================================================
   VIEW: BODY (profile + log)
   ===================================================== */
function renderBody() {
  const wrap = el('div');
  wrap.appendChild(renderPhaseBanner());

  wrap.appendChild(el('div', { class: 'section-title' }, 'Numbers'));

  let cwVal = state.profile.currentWeight != null ? state.profile.currentWeight : '';
  let twVal = state.profile.targetWeight != null ? state.profile.targetWeight : '';

  const grid = el('div', { class: 'body-grid' },
    // Profile card
    el('div', { class: 'body-card' },
      el('h3', {}, 'Set your block'),
      el('div', { class: 'input-row' },
        el('label', { class: 'input-label' }, 'Current bodyweight'),
        el('div', { class: 'input-unit-wrap' },
          el('input', {
            class: 'input',
            type: 'number',
            step: '0.1',
            placeholder: '0.0',
            value: cwVal,
            oninput: (e) => { cwVal = e.target.value; }
          }),
          el('div', { class: 'unit-toggle' },
            el('button', {
              class: state.profile.units === 'lbs' ? 'active' : '',
              onclick: async () => { state.profile.units = 'lbs'; await saveProfile(); render(); }
            }, 'lbs'),
            el('button', {
              class: state.profile.units === 'kg' ? 'active' : '',
              onclick: async () => { state.profile.units = 'kg'; await saveProfile(); render(); }
            }, 'kg')
          )
        )
      ),
      el('div', { class: 'input-row' },
        el('label', { class: 'input-label' }, 'Target bodyweight'),
        el('input', {
          class: 'input',
          type: 'number',
          step: '0.1',
          placeholder: '0.0',
          value: twVal,
          oninput: (e) => { twVal = e.target.value; }
        })
      ),
      el('button', {
        class: 'btn full',
        onclick: async () => {
          const c = parseFloat(cwVal);
          const t = parseFloat(twVal);
          if (!isNaN(c) && c > 0) state.profile.currentWeight = c;
          if (!isNaN(t) && t > 0) state.profile.targetWeight = t;
          // Also append weight log entry for today if current changed
          if (!isNaN(c) && c > 0) {
            const date = todayStr();
            const idx = state.weights.findIndex(w => w.date === date);
            const entry = { date, weight: c, units: state.profile.units };
            if (idx >= 0) state.weights[idx] = entry;
            else state.weights.push(entry);
            await saveWeights();
          }
          await saveProfile();
          render();
        }
      }, 'Save')
    ),
    // Phase explanation card
    renderPhaseDetail()
  );
  wrap.appendChild(grid);

  // Weight log
  wrap.appendChild(el('div', { class: 'section-title' }, 'Weight log'));
  wrap.appendChild(renderWeightLog());

  // Step log
  wrap.appendChild(el('div', { class: 'section-title' }, 'Steps · last 7 days'));
  wrap.appendChild(renderStepLog());

  wrap.appendChild(renderFooter());
  return wrap;
}

function renderPhaseDetail() {
  const phase = currentPhase();
  if (!phase) {
    return el('div', { class: 'body-card' },
      el('h3', {}, 'Phase'),
      el('p', { style: { fontSize: '13px', color: 'var(--ink-muted)', lineHeight: '1.6' } },
        'Once you set both a current and target bodyweight, the program will derive your block — Building, Maintaining, or Cutting — and surface phase-specific guidance on each session.'
      ),
      el('p', { style: { fontSize: '12px', color: 'var(--ink-faint)', marginTop: '12px', lineHeight: '1.5', fontStyle: 'italic' } },
        'Building = target is ~3+ above current. Cutting = target is ~3+ below. Otherwise: maintain.'
      )
    );
  }
  const g = PHASE_GUIDANCE[phase];
  return el('div', { class: 'body-card' },
    el('h3', {}, g.name),
    el('p', { style: { fontSize: '13px', color: 'var(--ink-heavy)', fontWeight: '600', marginBottom: '10px' } }, g.intent),
    el('p', { style: { fontSize: '13px', color: 'var(--ink-muted)', lineHeight: '1.65' } }, g.detail)
  );
}

function renderWeightLog() {
  if (!state.weights.length) {
    return el('div', { class: 'body-card' },
      el('p', { class: 'empty-state' }, 'No bodyweight entries yet. Log one above.')
    );
  }
  const card = el('div', { class: 'body-card' });
  const list = el('div', { class: 'log-list' });
  // Most recent first, last 14 entries
  const sorted = [...state.weights].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 14);
  sorted.forEach(w => {
    list.appendChild(el('div', { class: 'log-entry' },
      el('span', { class: 'date' }, fmtDate(w.date)),
      el('span', {}),
      el('span', { class: 'value' }, `${w.weight.toFixed(1)} ${w.units || state.profile.units}`),
    ));
  });
  card.appendChild(list);
  return card;
}

function renderStepLog() {
  // Last 7 days including today
  const card = el('div', { class: 'body-card' });
  const list = el('div', { class: 'log-list' });
  const dates = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    dates.push(`${y}-${m}-${day}`);
  }
  dates.forEach(date => {
    const count = state.steps[date] || 0;
    const pct = Math.min(100, (count / program.meta.stepGoal) * 100);
    const row = el('div', { class: 'log-entry', style: { gridTemplateColumns: 'auto 1fr auto' } },
      el('span', { class: 'date' }, fmtDate(date)),
      el('div', { class: 'stat-progress', style: { margin: 0, height: '6px' } },
        el('div', { class: 'stat-progress-fill', style: { width: pct + '%', background: count >= program.meta.stepGoal ? 'var(--done)' : 'var(--ink-muted)' } })
      ),
      el('span', { class: 'value' }, count.toLocaleString())
    );
    list.appendChild(row);
  });
  card.appendChild(list);
  return card;
}

/* =====================================================
   FOOTER
   ===================================================== */
function renderFooter() {
  return el('footer', { class: 'footer' },
    el('p', { class: 'footer-note' },
      el('strong', {}, 'A note on form. '),
      'Heavy compounds reward technique. If you\'re unsure on a squat, deadlift, bench, or press, film a set from the side and check it against a coaching video, or get one session with a qualified coach. This program assumes you know how to perform the lifts safely — if you don\'t yet, that\'s the first thing to fix.'
    ),
    el('div', { style: { display: 'flex', gap: '8px', flexWrap: 'wrap' } },
      el('button', {
        class: 'btn danger',
        style: { color: 'var(--ink-muted)', borderColor: 'var(--border-strong)' },
        onclick: exportAll
      }, 'Export'),
      el('button', {
        class: 'btn danger',
        style: { color: 'var(--ink-muted)', borderColor: 'var(--border-strong)' },
        onclick: importAll
      }, 'Import'),
      el('button', {
        class: 'btn danger',
        onclick: resetAll
      }, 'Reset')
    )
  );
}

/* =====================================================
   NAVIGATION
   ===================================================== */
function navigate(view) {
  state.view = view;
  render();
  window.scrollTo(0, 0);
}

function render() {
  const root = document.getElementById('app');
  root.innerHTML = '';
  root.appendChild(renderHeader());

  if (storage.mode === 'none') {
    root.appendChild(el('div', { class: 'storage-warning' },
      'Progress can\'t be saved here — your browser is blocking storage. Use Export to keep a JSON backup.'
    ));
  }

  let body;
  if (state.view === 'session') body = renderSession();
  else if (state.view === 'program') body = renderProgram();
  else if (state.view === 'body') body = renderBody();
  else body = renderToday();

  root.appendChild(body);
}

/* =====================================================
   INIT
   ===================================================== */
storage.init().then(loadAll).then(render);
</script>
</body>
</html>
